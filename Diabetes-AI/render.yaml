services:
  - type: web
    name: diabetes-ai-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python model/train_model.py
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
